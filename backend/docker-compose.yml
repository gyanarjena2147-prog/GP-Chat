version: '3.8'

services:
  # WhatsApp Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: whatsapp_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: whatsapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express & Socket.IO Real-time Messaging Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp_express_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/whatsapp_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
